<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TEK-TECH | Giriş Yap</title>
    <link rel="stylesheet" href="style.css"> <!-- Mevcut CSS'ini kullanıyoruz -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-container {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background: #0f0f0f;
        }
        .login-box {
            background: #1a1a1a; padding: 40px; border-radius: 10px; width: 400px;
            border: 1px solid #47dcc3; box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
        }
        .login-box h2 { color: white; text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { color: #ccc; display: block; margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 12px; background: #222; border: 1px solid #333;
            color: white; border-radius: 5px; outline: none;
        }
        .input-group input:focus { border-color: #47dcc3; }
        .login-btn {
            width: 100%; padding: 12px; background: #47dcc3; border: none;
            color: black; font-weight: bold; cursor: pointer; border-radius: 5px;
        }
        #message { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Giriş Yap</h2>
            <div class="input-group">
                <label>E-posta</label>
                <input type="email" id="email" placeholder="ornek@mail.com">
            </div>
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="******">
            </div>
            <button class="login-btn" onclick="login()">GİRİŞ YAP</button>
            <div id="message"></div>
            <p style="color: #888; text-align: center; margin-top: 20px; font-size: 13px;">
                Henüz üye değil misin? <a href="register.html" style="color: #47dcc3;">Kayıt Ol</a>
            </p>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    msg.style.color = "#2ecc71";
                    msg.innerText = "Giriş başarılı! Yönlendiriliyorsunuz...";
                    localStorage.setItem('user', JSON.stringify(data.user)); // Kullanıcıyı kaydet
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    msg.style.color = "#e74c3c";
                    msg.innerText = data.message;
                }
            } catch (error) {
                msg.innerText = "Sunucuya bağlanılamadı!";
            }
        }
    </script>
</body>
</html>
